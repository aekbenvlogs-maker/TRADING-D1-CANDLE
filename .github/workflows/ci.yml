name: CI — Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Build + Lint + Test (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Cython extensions
        run: make build

      - name: Format check (black)
        run: black --check trading_d1_bougie/

      - name: Lint (ruff)
        run: ruff check trading_d1_bougie/

      - name: Type check (mypy)
        run: mypy trading_d1_bougie/ --ignore-missing-imports

      - name: Unit + integration tests with coverage
        run: |
          pytest trading_d1_bougie/tests/ \
            --cov=trading_d1_bougie.core \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            coverage.xml
            TRADING_D1_BOUGIE_coverage_report.html
