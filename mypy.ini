[mypy]
python_version = 3.11
strict = True
exclude = trading_d1_bougie/core/.*\.pyx

# Third-party libs without stubs
[mypy-ib_insync.*]
ignore_missing_imports = True

[mypy-matplotlib.*]
ignore_missing_imports = True

[mypy-pandas.*]
ignore_missing_imports = True

[mypy-yaml]
ignore_missing_imports = True

[mypy-Cython.*]
ignore_missing_imports = True

# Cython compiled modules — .pyi stubs available in trading_d1_bougie/core/
# Stubs: d1_range_builder.pyi, entry_validator.pyi, order_manager.pyi,
#        risk_manager.pyi, structure_detector.pyi, trend_detector.pyi
[mypy-trading_d1_bougie.core.*]
ignore_missing_imports = False

# Test files — relax strict typing for test helpers
[mypy-trading_d1_bougie.tests.*]
disallow_untyped_defs = False
disallow_untyped_calls = False
disallow_incomplete_defs = False
check_untyped_defs = False
