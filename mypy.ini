[mypy]
python_version = 3.11
strict = True
exclude = trading_d1_bougie/core/.*\.pyx

# Third-party libs without stubs
[mypy-ib_insync.*]
ignore_missing_imports = True

[mypy-vectorbt.*]
ignore_missing_imports = True

[mypy-matplotlib.*]
ignore_missing_imports = True

[mypy-pandas.*]
ignore_missing_imports = True

[mypy-yaml]
ignore_missing_imports = True

# Cython compiled modules — no .pyi stubs
[mypy-trading_d1_bougie.core.*]
ignore_missing_imports = True

# Test files — untyped mirror classes by design
[mypy-trading_d1_bougie.tests.*]
disallow_untyped_defs = False
disallow_untyped_calls = False
disallow_incomplete_defs = False
check_untyped_defs = False
